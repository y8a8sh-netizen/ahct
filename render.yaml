services:
  - type: web
    name: ahct
    runtime: node
    rootDir: server
    buildCommand: npm install && node -e "require('bcryptjs'); require('jsonwebtoken'); console.log('deps ok')"
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_MODE
        value: postgres
      - key: JWT_SECRET
        generateValue: true
